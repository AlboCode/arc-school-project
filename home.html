<!doctype html>

<html lang="jp">
<head>
  <meta charset="utf-8">

  <title>ARC Academy Group 3 poster viewer</title>
  <meta name="description" content="Poster viewer">
  <meta name="author" content="ARC Academy Group 3">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css?family=M+PLUS+1p" rel="stylesheet">
  <link rel="stylesheet" href="normalize.css">
  <link href="https://fonts.googleapis.com/earlyaccess/nicomoji.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>

<body style="width: 100%;">
  <h1 class="text-center">怖い地震</h1>
  <h3 class="text-center">今日は地震について発表しましょう！</h3>
  <section class="mouse-section"
           data-aos="fade-down"
           data-aos-offset="0"
           data-aos-delay="500"
           data-aos-duration="1000"
           data-aos-easing="ease-in-out"
           data-aos-mirror="true"
           data-aos-once="true"
           data-aos-anchor-placement="top-center">
    <div style="
    position: absolute;

    display: block; width: auto; left: 40px ;
    bottom: -10px;" >
      <p class="text-center shadow" style="margin: 0.5em">プレートの押し出し</p>
    </div>
    <img src="images/earthquake.png" alt="" style="width: 100%; height: auto">
    <img src="images/mouse.png" alt="" style="width: 100%; height: auto;">
  </section>
  <section class="dangers-section"
           data-aos="fade-down"
           data-aos-offset="-200"
           data-aos-delay="500"
           data-aos-duration="1000"
           data-aos-easing="ease-in-out"
           data-aos-mirror="true"
           data-aos-once="true"
           data-aos-anchor-placement="top-center"
  >
    <img src="images/explosion.png" alt="" style="width: 100%; height: auto">
  </section>
  <section class="dangers-section"
           data-aos="fade-down"
           data-aos-offset="-200"
           data-aos-delay="500"
           data-aos-duration="1000"
           data-aos-easing="ease-in-out"
           data-aos-mirror="true"
           data-aos-once="true"
           data-aos-anchor-placement="top-center"
  >
    <div style="
    position: absolute;

    display: block; width: auto; right: 0px ;
    bottom: 81px;" >

    </div>
    <div style="
    position: absolute;

    display: block;  right: 0px;
    left: 0;
    width: auto; text-align: center;
    top: -38px;" >
      <p class=" shadow" style="margin: 0.5em; text-align: right">ビルがくずれたり</p>
      <p class="text-center shadow" style="margin: 0.5em">木も倒れかもしれない</p>
      <p class="shadow" style="text-align: left; margin: 0.5em">上から物が落ちてきる。</p>
    </div>
    <img src="images/earthquake_inside.png" alt="" style="width: 100%; height: auto">
  </section>
  <section class="dangers-section"
           data-aos="fade-down"
           data-aos-offset="-200"
           data-aos-delay="500"
           data-aos-duration="1000"
           data-aos-easing="ease-in-out"
           data-aos-mirror="true"
           data-aos-once="true"
           data-aos-anchor-placement="top-center"
  >
    <img src="images/escape.png" alt="" style="width: 100%; height: auto">
    <div style="
    position: absolute;

    display: block;  right: 0px;
    left: 0;
    width: auto; text-align: center;
    bottom: 10px;" >

      <p class="text-center shadow" style="margin: 0.5em">階段を歩いたほうが安全です。</p>
    </div>
  </section>
  <section style="padding-bottom: 30px;" class="dangers-section"
           data-aos="fade-down"
           data-aos-offset="-200"
           data-aos-delay="500"
           data-aos-duration="1000"
           data-aos-easing="ease-in-out"
           data-aos-mirror="true"
           data-aos-once="true"
           data-aos-anchor-placement="top-center">
    <img src="images/how_to_be_safe.png" alt="" style="width: 100%; height: auto">
    <div style="
    position: absolute;

    display: block;  right: 0px;

    left: 0;
    width: auto; text-align: center;
    bottom: 10px;" >

      <p class="text-center shadow" style="margin: 0.5em">広い場所見つけていた方がいいです。</p>
    </div>
  </section>
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>
    AOS.init({
      // Global settings:
      disable: false, // accepts following values: 'phone', 'tablet', 'mobile', boolean, expression or function
      startEvent: 'DOMContentLoaded', // name of the event dispatched on the document, that AOS should initialize on
      initClassName: 'aos-init', // class applied after initialization
      animatedClassName: 'aos-animate', // class applied on animation
      useClassNames: false, // if true, will add content of `data-aos` as classes on scroll
      disableMutationObserver: false, // disables automatic mutations' detections (advanced)
      debounceDelay: 50, // the delay on debounce used while resizing window (advanced)
      throttleDelay: 99, // the delay on throttle used while scrolling the page (advanced)


      // Settings that can be overridden on per-element basis, by `data-aos-*` attributes:
      offset: 0, // offset (in px) from the original trigger point
      delay: 0, // values from 0 to 3000, with step 50ms
      duration: 400, // values from 0 to 3000, with step 50ms
      easing: 'ease', // default easing for AOS animations
      once: false, // whether animation should happen only once - while scrolling down
      mirror: false, // whether elements should animate out while scrolling past them
      anchorPlacement: 'top-bottom', // defines which position of the element regarding to window should trigger the animation

    });
  </script>
</body>
</html>
